<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ADPS Roadmap</title>
    <style>
        :root { --bg: #0a0e17; --card: #161d2b; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .header { margin-top: 50px; font-size: 1.8rem; text-align: center; }
        .map-box { 
            margin-top: 40px; width: 80%; max-width: 700px; padding: 80px 20px;
            background: var(--card); border-radius: 20px; text-align: center; position: relative;
        }
        /* Кастомный значок провода через символ */
        .status-icon { font-size: 5rem; color: #2d384e; display: block; margin-bottom: 20px; transform: rotate(-15deg); }
        .title { font-size: 1.6rem; color: #888; }
        .desc { color: #444; margin-top: 10px; max-width: 300px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>
    <div class="header">Добро пожаловать в таблицу обновлений</div>
    <div class="map-box">
        <div class="status-icon">🖇️</div>
        <div class="title">Пустовато...</div>
        <div class="desc">Пока что от разработчиков ADPS тихо! Следите за новостями.</div>
    </div>
    <a href="../index.html" style="margin-top:20px; color:#007bff; text-decoration:none;">Вернуться к выбору</a>
</body>
</html>

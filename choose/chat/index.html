<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ADPS Global Chat | VK Sync</title>
    <style>
        :root { --bg: #0a0e17; --card: #161d2b; --vk-blue: #0077ff; }
        body { margin: 0; background: var(--bg); color: #e1e1e1; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 12px; background: #1a2233; border-bottom: 1px solid #1f293d; text-align: center; }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        
        .message { background: #1e2638; padding: 10px 15px; border-radius: 12px; max-width: 80%; align-self: flex-start; border: 1px solid #2d384e; }
        .admin-msg { align-self: center; width: 90%; background: rgba(0, 119, 255, 0.05); border: 2px solid var(--vk-blue); border-radius: 15px; padding: 12px; }
        
        .sender { font-size: 0.7rem; font-weight: bold; color: #00ff00; margin-bottom: 3px; }
        .admin-label { color: var(--vk-blue); font-size: 0.65rem; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 4px; }
        
        .input-area { padding: 15px; background: #1a2233; display: flex; gap: 10px; border-top: 1px solid #1f293d; }
        input { flex: 1; background: #0a0e17; border: 1px solid #2d384e; padding: 12px; border-radius: 10px; color: white; outline: none; }
        button { background: var(--vk-blue); color: white; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #status { font-size: 0.7rem; margin-top: 5px; color: #555; }
    </style>
</head>
<body>

<header>
    <h3 style="margin:0">ADPS Global Chat</h3>
    <div id="status">Инициализация...</div>
</header>

<div id="chat-messages">
    <div style="text-align: center; color: #444; margin-top: 50px;">Ожидание сообщений из ВК...</div>
</div>

<div class="input-area">
    <input type="text" id="msg-input" placeholder="Написать в беседу ВК...">
    <button id="send-btn">SEND</button>
</div>

<script>
    // --- ТВОИ ДАННЫЕ ---
    const VK_TOKEN = 'vk1.a.s576qQa93NIoBNc1nmTI3BHaB9FNvs-Wu8C8F10btSZ3wm_V5ZIMA_n9cNP8CrPftqKiLTBrBEUGcvXeit41Q0JNmU0F4thkCddA_j1MjPnIKnYogHd08vdP7ggAZGqkt3k0HM9-7uliJd4nSEuBxHrayInYv-9XCoGZFzs1KNoExwDX1n33RNHbimrltRdgbbNOie4bjFnxLyKr0hcNgg'; 
    const GROUP_ID = '237925734';
    // -------------------

    const msgBox = document.getElementById('chat-messages');
    const statusText = document.getElementById('status');

    function renderMsg(name, text, isAdmin) {
        const div = document.createElement('div');
        div.className = isAdmin ? 'message admin-msg' : 'message';
        div.innerHTML = isAdmin ? 
            `<span class="admin-label">🛡️ ADPS MODERATOR</span><div class="sender" style="color:var(--vk-blue)">${name}</div><div>${text}</div>` :
            `<div class="sender">${name}</div><div>${text}</div>`;
        msgBox.appendChild(div);
        msgBox.scrollTop = msgBox.scrollHeight;
    }

    async function vkReq(method, params) {
        const p = new URLSearchParams({ ...params, access_token: VK_TOKEN, v: '5.131' });
        // Используем сервис AllOrigins для обхода CORS
        const url = `https://allorigins.win{encodeURIComponent(`https://vk.com{method}?${p}`)}`;
        const r = await fetch(url);
        const d = await r.json();
        return JSON.parse(d.contents);
    }

    async function initChat() {
        try {
            statusText.innerText = "Подключение к LongPoll...";
            const res = await vkReq('groups.getLongPollServer', { group_id: GROUP_ID });
            if(!res.response) {
                statusText.innerText = "Ошибка: проверьте токен!";
                return;
            }

            let { server, key, ts } = res.response;
            statusText.innerText = "🟢 Чат активен";
            statusText.style.color = "#28a745";

            while (true) {
                const lpUrl = `https://allorigins.win{encodeURIComponent(`${server}?act=a_check&key=${key}&ts=${ts}&wait=25`)}`;
                const lpResp = await fetch(lpUrl);
                const data = JSON.parse((await lpResp.json()).contents);

                if (data.updates) {
                    data.updates.forEach(u => {
                        if (u.type === 'message_new') {
                            const m = u.object.message;
                            // Проверяем, что сообщение из любой беседы (peer_id > 2000000000)
                            if (m.peer_id > 2000000000) {
                                const isAdm = m.from_id < 0; 
                                renderMsg(isAdm ? 'System' : 'User_' + m.from_id, m.text, isAdm);
                            }
                        }
                    });
                }
                ts = data.ts;
            }
        } catch (e) {
            statusText.innerText = "Ошибка связи с сервером";
            console.error(e);
        }
    }

    document.getElementById('send-btn').onclick = async () => {
        const txt = document.getElementById('msg-input').value;
        if (!txt || VK_TOKEN.length < 10) return;

        // Отправляем в последнюю активную беседу (или нужно указать конкретный peer_id)
        // Для первой беседы бота это обычно 2000000001
        await vkReq('messages.send', { 
            peer_id: '2000000001', 
            message: txt, 
            random_id: Math.floor(Math.random() * 1000000) 
        });
        document.getElementById('msg-input').value = '';
    };

    if(VK_TOKEN.length > 10) initChat();
</script>
</body>
</html>

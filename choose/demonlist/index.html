<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ADPS Demon List</title>
    <style>
        /* Стили общие с чатом для единства дизайна */
        :root { --bg: #0a0e17; --card: #161d2b; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .header { margin-top: 50px; font-size: 1.8rem; }
        .list-container { 
            margin-top: 40px; width: 85%; max-width: 800px; padding: 60px 20px;
            background: var(--card); border-radius: 30px; text-align: center; border: 1px solid #1f293d;
        }
        .broken-plug { font-size: 4rem; filter: grayscale(1); opacity: 0.3; margin-bottom: 20px; display: block; }
        .msg { font-size: 1.4rem; color: #aaa; margin-bottom: 10px; }
        .sub-msg { color: #555; font-size: 0.9rem; }
        .small-info { margin-top: 20px; font-size: 0.75rem; color: #3d4a66; font-style: italic; }
    </style>
</head>
<body>
    <div class="header">Добро пожаловать в Demon List</div>
    <div class="list-container">
        <span class="broken-plug">🔌</span>
        <div class="msg">Тише! Слышите?</div>
        <div class="sub-msg">Видимо ещё не выпустили ни одного Demon уровня!</div>
        <div class="small-info">Demon list обновляется каждые 12 - 24 часа</div>
    </div>
    <a href="../index.html" style="margin-top:20px; color:#007bff; text-decoration:none;">Назад</a>
</body>
</html>

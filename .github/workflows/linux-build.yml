name: Build GDPS for Linux
on: [push] # Собирать при каждом пуше в репозиторий

jobs:
  build:
    runs-on: ubuntu-latest # Используем Linux сервер GitHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare GDPS Package
        run: |
          mkdir -p release/MyGDPS-Linux
          wget https://github.com -O game.zip
          unzip game.zip -d release/MyGDPS-Linux/
          
          # ПЕРЕИМЕНОВЫВАЕМ ФАЙЛ (убираем вертикальную черту)
          # Замени старое имя на новое без черточки
          cd release/MyGDPS-Linux/
          mv "Axiom Dash | ADPS.exe" "Axiom_Dash_ADPS.exe" 2>/dev/null || true
          cd ../..

          # Создаем скрипт-запускатор с НОВЫМ именем
          echo '#!/bin/bash' > release/MyGDPS-Linux/start.sh
          echo 'wine Axiom_Dash_ADPS.exe' >> release/MyGDPS-Linux/start.sh
          chmod +x release/MyGDPS-Linux/start.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyGDPS-Linux-Version
          path: release/MyGDPS-Linux/

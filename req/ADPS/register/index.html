<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - GDPS</title>
    <style>
        body { background: #0a0e17; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161d2b; padding: 40px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #1f293d; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d384e; background: #1e2638; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        a { color: #007bff; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>New Account</h2>
        <input type="text" id="nick" placeholder="GD Nickname">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password (min 6 symbols)">
        <button id="regBtn">CREATE ACCOUNT</button>
        <a href="https://github.io" style="display:block; margin-top:15px; color:gray;">Back to Login</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://gstatic.com";
        import { getDatabase, ref, set } from "https://gstatic.com";

        const firebaseConfig = { apiKey: "AIzaSyC0kGxFHYTRLcWTextgHqguZeaxkwHS5KY", authDomain: "adps-rateing-system.firebaseapp.com", projectId: "adps-rateing-system", appId: "1:307068938310:web:c5b8286dd592bd32694247" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        document.getElementById('regBtn').addEventListener('click', () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const n = document.getElementById('nick').value;

            if(!e || p.length < 6 || !n) return alert("Check inputs (Pass min 6 chars)");

            createUserWithEmailAndPassword(auth, e, p).then((res) => {
                updateProfile(res.user, { displayName: n }).then(() => {
                    set(ref(db, 'users/' + res.user.uid), {
                        username: n,
                        muteUntil: 0
                    }).then(() => {
                        window.location.href = "https://github.io";
                    });
                });
            }).catch(err => alert("Error: " + err.message));
        });
    </script>
</body>
</html>

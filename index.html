<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Guard</title>
    <style>
        /* Используем системные шрифты для мгновенного старта */
        body {
            margin: 0;
            background: #0a0e14;
            color: #e1e7ef;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .v-box {
            text-align: center;
            width: 90%;
            max-width: 380px;
            padding: 30px;
            background: #11161d;
            border-radius: 24px;
            border: 1px solid #1c232d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 { font-size: 1.4rem; margin-bottom: 8px; font-weight: 700; }
        p { font-size: 0.85rem; opacity: 0.5; margin-bottom: 25px; }

        /* Ядро */
        .core {
            width: 80px;
            height: 80px;
            background: #00a2ff;
            border-radius: 50%;
            margin: 0 auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.3);
            transition: 0.2s;
        }
        .core:active { transform: scale(0.9); }
        .inner { width: 30%; height: 30%; background: #fff; border-radius: 50%; animation: p 1.5s infinite; }

        @keyframes p { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.4; } }

        /* Слайдер */
        #s2 { display: none; }
        .sl-con {
            width: 100%;
            height: 54px;
            background: #070a0e;
            border-radius: 50px;
            position: relative;
            display: flex;
            align-items: center;
            border: 1px solid #1c232d;
        }

        .sl-txt { position: absolute; width: 100%; text-align: center; font-size: 0.7rem; font-weight: 700; opacity: 0.3; pointer-events: none; }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
            z-index: 2;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 46px;
            height: 46px;
            background: #00a2ff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.4);
        }

        .check { display: none; color: #00ff88; font-size: 2.5rem; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="v-box">
        <div id="s1">
            <h1>Axiom Guard</h1>
            <p>Нажмите для входа</p>
            <div class="core" onclick="go()"><div class="inner"></div></div>
        </div>

        <div id="s2">
            <h1>Проверка</h1>
            <p>Потяните ползунок вправо</p>
            <div class="sl-con">
                <div class="sl-txt">ПОДТВЕРДИТЬ →</div>
                <input type="range" id="sl" min="0" max="100" value="0">
            </div>
        </div>

        <div id="ok" class="check">✓</div>
    </div>

    <script>
        const d = document;
        function go() { d.getElementById('s1').style.display='none'; d.getElementById('s2').style.display='block'; }

        d.getElementById('sl').oninput = function() {
            if (this.value >= 95) {
                this.disabled = true;
                d.getElementById('s2').style.display='none';
                d.getElementById('ok').style.display='block';
                setTimeout(() => {
                    location.href = "https://albeepython.github.io/axiom-launcher/home/";
                }, 800);
            }
        };
    </script>
</body>
</html>

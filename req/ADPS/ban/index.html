<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banned - GDPS</title>
    <style>
        body { background: #0a0e17; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .ban-box { background: #161d2b; padding: 50px; border-radius: 20px; border: 2px solid #dc3545; max-width: 500px; }
        h1 { color: #dc3545; font-size: 3rem; margin: 0; }
        .timer { font-size: 2rem; color: #ffc107; margin: 25px 0; font-family: monospace; }
        a { color: #5865F2; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="ban-box">
        <h1>BANNED</h1>
        <p>Вы были замучены за нарушение правил сайта.</p>
        <div class="timer" id="timer">--:--:--</div>
        <p>Для обжалования:</p>
        <a href="https://discord.com">Discord Support Ticket</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, onAuthStateChanged } from "https://gstatic.com";
        import { getDatabase, ref, onValue } from "https://gstatic.com";

        const firebaseConfig = { apiKey: "AIzaSyC0kGxFHYTRLcWTextgHqguZeaxkwHS5KY", authDomain: "adps-rateing-system.firebaseapp.com", projectId: "adps-rateing-system", appId: "1:307068938310:web:c5b8286dd592bd32694247" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "https://albeepython.github.io/axiom-launcher/req/ADPS/authtorize";
            
            onValue(ref(db, 'users/' + user.uid), (snap) => {
                const data = snap.val();
                if (!data || data.muteUntil <= Date.now()) {
                    window.location.href = "https://albeepython.github.io/axiom-launcher/req/ADPS/home";
                } else {
                    setInterval(() => {
                        const diff = data.muteUntil - Date.now();
                        if (diff <= 0) window.location.href = "https://albeepython.github.io/axiom-launcher/req/ADPS/home";
                        const m = Math.floor(diff / 60000);
                        const s = Math.floor((diff % 60000) / 1000);
                        document.getElementById('timer').innerText = `${m}m ${s}s`;
                    }, 1000);
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADPS Rate</title>
    <style>
        :root { --bg: #0a0e17; --card: #161d2b; --accent: #007bff; --text: #e1e1e1; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        header { background: rgba(22, 29, 43, 0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f293d; position: sticky; top: 0; z-index: 10; }
        .search-bar { background: #1e2638; border-radius: 20px; padding: 5px 15px; border: 1px solid #2d384e; width: 250px; }
        .search-bar input { background: none; border: none; color: white; outline: none; width: 100%; }
        .levels { padding: 40px 10%; display: flex; flex-direction: column; gap: 15px; max-width: 800px; margin: 0 auto; }
        .level-card { background: var(--card); padding: 20px; border-radius: 12px; border-left: 5px solid var(--accent); display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
        .btn-post { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 20px; }
        .admin-btns button { margin-left: 5px; cursor: pointer; border: none; border-radius: 4px; padding: 8px 12px; color: white; }
        .btn-del { background: #dc3545; }
        .btn-mute { background: #ffc107; color: black !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo">ADPS <b>STATION</b></div>
    <div class="search-bar"><input type="text" id="searchInput" placeholder="Search level ID..."></div>
    <div id="user-info"><a href="https://github.io" style="color:var(--accent); text-decoration:none;">Login</a></div>
</header>

<main class="levels">
    <button class="btn-post" id="openBtn">Submit Level</button>
    <div id="levels-list"></div>
</main>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getDatabase, ref, onValue, push, remove, update, get } from "https://gstatic.com";
    import { getAuth, onAuthStateChanged, signOut } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyC0kGxFHYTRLcWTextgHqguZeaxkwHS5KY",
        authDomain: "adps-rateing-system.firebaseapp.com",
        projectId: "adps-rateing-system",
        storageBucket: "adps-rateing-system.firebasestorage.app",
        messagingSenderId: "307068938310",
        appId: "1:307068938310:web:c5b8286dd592bd32694247"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                const data = snapshot.val();
                if (data && data.muteUntil > Date.now()) {
                    window.location.href = 'https://github.io';
                    return;
                }
                document.getElementById('user-info').innerHTML = `
                    <span style="color:#00ff00">●</span> ${data ? data.username : user.email} | 
                    <button id="logoutBtn" style="background:none; border:none; color:gray; cursor:pointer;">Exit</button>
                `;
                document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
            });
        }
    });

    onValue(ref(db, 'levels'), (snapshot) => {
        const list = document.getElementById('levels-list');
        list.innerHTML = '';
        snapshot.forEach((child) => {
            const l = child.val();
            const isAdmin = auth.currentUser && auth.currentUser.email === "sew1k@mail.com";
            const card = document.createElement('div');
            card.className = 'level-card';
            card.innerHTML = `
                <div>
                    <h3 style="margin:0">${l.name} <small style="color:var(--accent)">[${l.rate}]</small></h3>
                    <p style="margin:5px 0 0; color:gray;">ID: ${l.id} | By: ${l.author}</p>
                </div>
                <div id="admin-tools-${child.key}"></div>
            `;
            list.appendChild(card);
            
            if(isAdmin) {
                const toolBox = document.getElementById(`admin-tools-${child.key}`);
                const dBtn = document.createElement('button'); dBtn.className='btn-del'; dBtn.innerText='✕';
                dBtn.onclick = () => remove(ref(db, 'levels/' + child.key));
                const mBtn = document.createElement('button'); mBtn.className='btn-mute'; mBtn.innerText='Mute';
                mBtn.onclick = () => update(ref(db, 'users/' + l.uid), { muteUntil: Date.now() + 3600000 });
                toolBox.append(dBtn, mBtn);
            }
        });
    });

    document.getElementById('openBtn').addEventListener('click', async () => {
        if(!auth.currentUser) return alert("Please Login first!");
        
        const name = prompt("Level Name (ENGLISH ONLY):");
        if(!name || !/^[a-zA-Z0-9 ]+$/.test(name)) return alert("Only English letters/numbers allowed!");
        
        const id = prompt("Level ID (digits only, min 3):");
        if(!id || id.length < 3 || isNaN(id)) return alert("Invalid ID!");

        // ПРОВЕРКА НА ДУБЛИКАТЫ
        const snapshot = await get(ref(db, 'levels'));
        let exists = false;
        snapshot.forEach(child => { if(child.val().id === id) exists = true; });

        if(exists) return alert("This Level ID is already submitted!");

        push(ref(db, 'levels'), {
            name: name, id: id, author: auth.currentUser.displayName || "User",
            uid: auth.currentUser.uid, rate: 'Normal', timestamp: Date.now()
        }).then(() => alert("Submitted successfully!"));
    });
</script>
</body>
</html>
